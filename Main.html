<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(20,20,20,0.85), rgba(20,20,20,0.85)),
    url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif")
    center / cover fixed;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  font-size: 60px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.search-box {
  margin-top: 10px;
  padding: 10px 20px;
  width: 250px;
  border-radius: 30px;
  border: none;
  outline: none;
}

/* SECTIONS */
.section {
  margin: 40px;
}

.section h2 {
  margin-bottom: 15px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

/* MOVIE CARD */
.movie-card {
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.06);
  transition: 0.3s;
  cursor: pointer;
}

.movie-card:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.15);
}

.movie-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.movie-card h3 {
  padding: 10px;
  font-size: 16px;
  text-align: center;
}

.watch-btn {
  margin: 10px;
  padding: 8px 15px;
  border-radius: 15px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL PLAYER */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal iframe {
  width: 90%;
  height: 80%;
  border-radius: 20px;
}

.close-btn {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 35px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width: 600px) {
  .featured {
    margin: 20px;
    padding: 20px;
  }
}

.glass-request-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;

  padding: 12px 20px;
  border-radius: 50px;

  background: rgba(30, 30, 30, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  color: #ffffff;
  font-family: Arial, sans-serif;
  font-size: 14px;
  text-decoration: none;

  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);

  transition: all 0.25s ease;
  z-index: 9999;
}

.glass-request-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.08);
}

/* TV SHOW DROPDOWN */
.movie-card select {
  width: 85%;
  margin: 12px auto;
  padding: 8px 12px;

  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.4);

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);

  color: white;
  font-size: 14px;
  cursor: pointer;
  outline: none;
  transition: 0.25s ease;
}

/* Hover effect */
.movie-card select:hover {
  background: rgba(255,255,255,0.2);
}

/* When clicked */
.movie-card select:focus {
  border: 1px solid white;
  background: rgba(255,255,255,0.25);
}

/* Dropdown options (inside list) */
.movie-card select option {
  color: black;
  background: white;
}
</style>

const content = document.getElementById("content");

function loadMovies() {
  content.innerHTML = "";

  const categories = [...new Set(movies.map(m => m.category))];

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${cat}</h2><div class="movie-grid"></div>`;
    content.appendChild(section);

    const grid = section.querySelector(".movie-grid");

    movies
      .filter(m => m.category === cat)
      .forEach(m => {
        const card = document.createElement("div");
        card.className = "movie-card";

        let controls = "";

        // If TV Show with episodes
        if (m.episodes) {
          controls = `
            <div style="text-align:center; padding:10px;">
              <select onchange="handleEpisodeSelect(this)">
                <option value="">Select Episode</option>
                ${m.episodes.map(ep =>
                  `<option value="${ep.link}">${ep.name}</option>`
                ).join("")}
              </select>
            </div>
          `;
        }
        // Regular movie
        else {
          controls = `
            <div style="text-align:center;">
              <button class="watch-btn" onclick="openVideo('${m.link}')">
                Watch
              </button>
            </div>
          `;
        }

        card.innerHTML = `
          <img src="${m.poster}">
          <h3>${m.title}</h3>
          ${controls}
        `;

        grid.appendChild(card);
      });
  });
}

function handleEpisodeSelect(selectElement) {
  const link = selectElement.value;
  if (link) {
    openVideo(link);
    selectElement.selectedIndex = 0; // reset dropdown
  }
}

function openVideo(link) {
  document.getElementById("videoFrame").src = link;
  document.getElementById("videoModal").style.display = "flex";
}

function closeVideo() {
  document.getElementById("videoFrame").src = "";
  document.getElementById("videoModal").style.display = "none";
}

function searchMovies() {
  let input = document.querySelector(".search-box").value.toLowerCase();

  document.querySelectorAll(".movie-card").forEach(card => {
    card.style.display =
      card.innerText.toLowerCase().includes(input)
        ? "block"
        : "none";
  });
}

loadMovies();
