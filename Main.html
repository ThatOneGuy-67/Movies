<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/ThatOneGuy-67/Movies@main/">
<meta charset="UTF-8">
<title>Movie Station</title>
</head>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(20,20,20,0.85), rgba(20,20,20,0.85)),
    url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif")
    center / cover fixed;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  font-size: 32px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.search-box {
  margin-top: 10px;
  padding: 10px 20px;
  width: 250px;
  border-radius: 30px;
  border: none;
  outline: none;
}

/* FEATURED */
.featured {
  margin: 40px;
  padding: 40px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  text-align: center;
  font-size: 26px;
}

/* SECTIONS */
.section {
  margin: 40px;
}

.section h2 {
  margin-bottom: 15px;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

/* MOVIE CARD */
.movie-card {
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.06);
  transition: 0.3s;
  cursor: pointer;
}

.movie-card:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.15);
}

.movie-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.movie-card h3 {
  padding: 10px;
  font-size: 16px;
  text-align: center;
}

.watch-btn {
  margin: 10px;
  padding: 8px 15px;
  border-radius: 15px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* MODAL PLAYER */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal iframe {
  width: 90%;
  height: 80%;
  border-radius: 20px;
}

.close-btn {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 35px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width: 600px) {
  .featured {
    margin: 20px;
    padding: 20px;
  }
}
</style>

<body>

<header>
  Movie Station
  <br>
  <input type="text" class="search-box" placeholder="Search movies..." onkeyup="searchMovies()">
</header>

<div class="featured">
  🎬 Featured Movie Tonight
</div>

<div id="content"></div>

<div class="modal" id="videoModal">
  <span class="close-btn" onclick="closeVideo()">✖</span>
  <iframe id="videoFrame" allow="autoplay"></iframe>
</div>

  { category: "Despicable Me", title: "Despicable Me 2", poster: "https://cdn.jsdelivr.net/gh/ThatOneGuy-67/Movies@main/Pics/DM2.jpg", link: "https://drive.google.com/file/d/1bTG8tnEKRvWZnnwNRrHSwOC028Rr_Mrg/preview" },

  // ===== SHREK =====
  { category: "Shrek", title: "Shrek", poster: "https://cdn.jsdelivr.net/gh/ThatOneGuy-67/Movies@main/Pics/Shrek1.jpg", link: "https://drive.google.com/file/d/1NezVaMIuVH1Gt0cHCQMT3JeJu7JuxlIG/preview" },

  { category: "Shrek", title: "Shrek 3", poster: "https://cdn.jsdelivr.net/gh/ThatOneGuy-67/Movies@main/Pics/Shrek3.jpg", link: "https://drive.google.com/file/d/1sJwO8a7Kj0MrqDqJAKYwzEEfMFhp8TDa/preview" },

  // ===== Random =====
  { category: "Random", title: "Super Mario Movie", poster: "https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg", link: "https://drive.google.com/file/d/1OsyF2LKJqjtv0b2Xd9GWOLcYkzny3VZo/preview" },
  { category: "Random", title: "Sonic 2", poster: "https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg", link: "https://drive.google.com/file/d/13YPdlfR1BTzXfqwmfbzfiuPycjQsh0Yb/preview" },
];

const content = document.getElementById("content");

function loadMovies() {
  content.innerHTML = "";
  const categories = [...new Set(movies.map(m => m.category))];

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${cat}</h2><div class="movie-grid"></div>`;
    content.appendChild(section);

    const grid = section.querySelector(".movie-grid");

    movies
      .filter(m => m.category === cat)
      .forEach(m => {
        const card = document.createElement("div");
        card.className = "movie-card";
        card.innerHTML = `
          <img src="${m.poster}">
          <h3>${m.title}</h3>
          <div style="text-align:center;">
            <button class="watch-btn" onclick="openVideo('${m.link}')">Watch</button>
          </div>
        `;
        grid.appendChild(card);
      });
  });
}

function openVideo(link){
  document.getElementById("videoFrame").src = link;
  document.getElementById("videoModal").style.display = "flex";
}

function closeVideo(){
  document.getElementById("videoFrame").src = "";
  document.getElementById("videoModal").style.display = "none";
}

function searchMovies(){
  let input = document.querySelector(".search-box").value.toLowerCase();
  document.querySelectorAll(".movie-card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

loadMovies();

</script>

</body>
</html>
